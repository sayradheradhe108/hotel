name: Count String with Mobile Alert

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to check'
        required: true
        default: 'https://gmvnonline.com/room-tariff.php?trhID=59&checkindate=23-04-2026&checkoutdate=24-04-2026&adults=&child='
      search_query:
        description: 'String to count'
        required: true
        default: 'not available in selected dates'
      threshold:
        description: 'Min occurrences before alerting'
        required: true
        default: '2'
  schedule:
    - cron: '0 */3 * * *'

jobs:
  check-webpage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run Counter Script
        id: counter_step
        env:
          TARGET_URL: ${{ github.event.inputs.url || 'https://example.com' }}
          SEARCH_STRING: ${{ github.event.inputs.search_query || 'Example' }}
          THRESHOLD: ${{ github.event.inputs.threshold || '1' }}
        run: |
          # Capture the output to see if it failed
          OUTPUT=$(python count_string.py)
          echo "$OUTPUT"
          
          # Check if the script indicated a failure
          if echo "$OUTPUT" | grep -q "STATUS=FAIL"; then
            echo "IS_ALERT=true" >> $GITHUB_ENV
          else
            echo "IS_ALERT=false" >> $GITHUB_ENV
          fi

      - name: Check Threshold and Alert
        if: env.IS_ALERT == 'true'
        run: |
          echo "::error title=Threshold Alert::The count for the searched string is below the required threshold."
          exit 1 # This failure triggers the GitHub Mobile notification
